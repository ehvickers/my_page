<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            color: #f0f6fc;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #8b949e;
            margin-bottom: 25px;
        }
        .spinner {
            border: 4px solid rgba(240, 246, 252, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #58a6ff;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Building Something Great</h1>
        <p>This site is currently under construction. Check back soon!</p>
        <div class="spinner"></div>
    </div>
</body>
</html>
